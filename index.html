<script>
"use strict";
/* ============== TUNABLES (port these straight into React) ============== */
const CFG = {
  WINDOW_PAIRS: 8,        // pairs held on the board at once
  REFILL_BUFFER: 4,       // spare empty slots kept open so new cards land away from a just-cleared spot
  DECK_PAIRS_DAILY: 22,   // total pairs to drain (incl. specials)
  DECK_PAIRS_PRACTICE: 16,
  FADE_OPEN: 22,          // seconds of life for a card entering early
  FADE_END: 15,           // seconds of life for a card entering late (ramp)
  FADE_HOLD: 0.22,        // fraction of life a card stays fully crisp before any fade begins (later start)
  CURVE: 1.7,             // shape of the opacity falloff after the hold
  FLOOR: 0.10,            // ghost opacity, never zero (a faint smudge marks position)
  MAX_BLUR: 7,            // px of blur at full fade — destroys identity (what), not position (where)
  BLUR_START: 0.28,       // post-hold progress where blur begins (bright phase stays sharp longer)
  GRAY_FULL: 0.6,         // post-hold progress where color is fully gone (kill color cue before shape cue)

  ICE_LOCK: 3,            // 🧊 lock input, fades keep running (hazard)
  CRYSTAL_REVEAL: 2.0,    // 🔮 re-reveal everything crisp
  BOMB_ADD_PAIRS: 2,      // 💣 grow window by N pairs
  RESOLVE_MS: 230,        // delay before a pair resolves (so you see it)
  MATCH_COOLDOWN: 200,    // P4: snappier input unlock (was 380); recall-bonus + dark-penalty still curb board-sweeping
  MATCH_BASE: 100,
  RECALL_THRESHOLD: 0.5,  // min fade (both cards) to count as a from-memory match (option 3)
  RECALL_MULT: 3,         // from-memory matches are worth this multiple

const POOL = ['🍓','🔔','🌙','⚡','🍄','🎈','🌶️','🐙','🦋','🍋','🌵','🪩','🚀','🛸','🌸','🌼','🦊','🍒','🪐','🎲','🧩','🍉','🦀','🌻','🥑','🐢','🍡','🪼'];
const SPECIALS = [
  {emoji:'⏳', kind:'clock'},
  {emoji:'🔮', kind:'crystal'},
  {emoji:'🧊', kind:'ice'},
  {emoji:'💣', kind:'bomb'},
];

/* ============== daily modifiers (Tier 2) — same for everyone that day ============== */
const MODIFIERS = [
  {id:'clear', name:'Clear Skies', desc:'Standard fade — no twist today.', fadeMul:1,    bornFrac:0,    deckAdd:0, twinBomb:false},
  {id:'fog',   name:'Fog',         desc:'Cards arrive already dimming.',   fadeMul:1,    bornFrac:0.34, deckAdd:0, twinBomb:false},
  {id:'black', name:'Blackout',    desc:'Everything fades faster.',        fadeMul:0.68, bornFrac:0,    deckAdd:0, twinBomb:false},
  {id:'calm',  name:'Calm',        desc:'A merciful, slower fade.',        fadeMul:1.4,  bornFrac:0,    deckAdd:0, twinBomb:false},
  {id:'deep',  name:'The Deep',    desc:'A longer deck — more to clear.',  fadeMul:1,    bornFrac:0,    deckAdd:6, twinBomb:false},
  {id:'twin',  name:'Twin Bomb',   desc:'Two bombs hide in the deck.',     fadeMul:1,    bornFrac:0,    deckAdd:0, twinBomb:true},
];
function modForDay(dn){ return MODIFIERS[((dn % MODIFIERS.length)+MODIFIERS.length)%MODIFIERS.length]; }

/* ============== streak persistence (Tier 2) — degrades safely if storage is blocked ============== */
const STORE_KEY='fade_prog_v1';
function loadProg(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY))||{}; }catch(e){ return {}; } }
function saveProg(p){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(p)); }catch(e){} }
let PROG = loadProg();
function currentStreak(){ const dn=dailyNumber(); return (PROG.lastDay===dn || PROG.lastDay===dn-1) ? (PROG.streak||0) : 0; }
function recordDailyWin(dn, sec){
  if(dn!==dailyNumber()) return currentStreak();         // only today's daily moves the streak
  if(PROG.lastDay===dn){ /* replayed today: keep streak */ }
  else if(PROG.lastDay===dn-1){ PROG.streak=(PROG.streak||0)+1; }
  else { PROG.streak=1; }
  PROG.lastDay=dn;
  PROG.best=PROG.best||{}; if(PROG.best[dn]==null || sec<PROG.best[dn]) PROG.best[dn]=sec;
  saveProg(PROG);
  return PROG.streak;
}

/* ============== friend-challenge link (Tier 1) ============== */
function parseChallenge(){
  const q=new URLSearchParams(location.search);
  if(!q.has('fade')) return null;
  return { dn:parseInt(q.get('fade'),10), beat:q.has('beat')?parseFloat(q.get('beat')):null };
}
const CHALLENGE = parseChallenge();

/* ============== fade rank (Tier 1) ============== */
function fadeRank(){
  const norm=G.matchedLog.filter(m=>m.kind==='normal');
  const avg=norm.length ? norm.reduce((s,m)=>s+m.fade,0)/norm.length : 0;
  if(avg<0.30) return {name:'BRIGHT', sub:'fast and clear',      color:'#3eb597'};
  if(avg<0.55) return {name:'HAZY',   sub:'kept up well',        color:'#ffd166'};
  if(avg<0.78) return {name:'DIM',    sub:'mostly from memory',  color:'#9ab0d8'};
  return            {name:'DARK',   sub:'cleared in the dark', color:'#9ad8ff'};
}

/* ============== next-FADE countdown (Tier 2) ============== */
let cdTimer=null;
function startCountdown(){
  clearInterval(cdTimer);
  const tick=()=>{
    const n=new Date(), m=new Date(n); m.setHours(24,0,0,0);
    let s=Math.max(0,Math.floor((m-n)/1000));
    const h=Math.floor(s/3600), mn=Math.floor(s%3600/60), se=s%60;
    $('#countdown').textContent=`Next MEMORY in ${h}:${String(mn).padStart(2,'0')}:${String(se).padStart(2,'0')}`;
  };
  tick(); cdTimer=setInterval(tick,1000);
}

/* ============== sound + haptics ============== */
let AC=null; let soundOn = !(PROG.soundOff);
function ac(){ try{ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); }catch(e){} return AC; }
function tone(freq,dur,type,gain,delay){
  if(!soundOn) return; const c=ac(); if(!c) return;
  const t=c.currentTime+(delay||0); const o=c.createOscillator(), g=c.createGain();
  o.type=type||'sine'; o.frequency.value=freq; o.connect(g); g.connect(c.destination);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(gain||0.18,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.03);
}
function buzz(p){ if(!soundOn) return; if(navigator.vibrate){ try{navigator.vibrate(p);}catch(e){} } }
const SFX={
  match(combo){ const base=520*Math.pow(1.045, Math.min(combo,20)); tone(base,0.12,'triangle',0.16); tone(base*1.5,0.11,'sine',0.09,0.04); buzz(10); },
  wrong(){ tone(150,0.18,'square',0.13); buzz([0,30,30,30]); },
  clock(){ tone(880,0.16,'sine',0.16); tone(1175,0.22,'sine',0.11,0.08); buzz(15); },
  crystal(){ [660,880,1100,1320].forEach((f,i)=>tone(f,0.12,'sine',0.10,i*0.05)); buzz(15); },
  ice(){ tone(120,0.3,'square',0.15); tone(88,0.42,'sine',0.11,0.05); buzz([0,40,30,40]); },
  bomb(){ tone(180,0.4,'sawtooth',0.18); tone(68,0.5,'square',0.15,0.03); buzz([0,25,25,60]); },
  win(){ [523,659,784,1047].forEach((f,i)=>tone(f,0.22,'triangle',0.16,i*0.1)); buzz([0,18,40,18,40,60]); },
  recall(){ [784,1047,1319,1568].forEach((f,i)=>tone(f,0.14,'triangle',0.14,i*0.05)); buzz([0,15,30,25]); },
  tick(){ tone(440,0.10,'sine',0.15); buzz(10); },
  go(){ tone(660,0.12,'triangle',0.17); tone(990,0.3,'triangle',0.18,0.1); buzz([0,25,40,40]); },
};
function setSound(on){ soundOn=on; PROG.soundOff=!on; saveProg(PROG); }

/* ============== first-time special hints (one-time onboarding) ============== */
const seenSpecials=new Set(Object.keys(PROG.seenSpecials||{}));
const HINTS={
  clock:'⏳ <b>Time freeze</b> — match it to pause the timer for 5s.',
  crystal:'🔮 <b>Crystal Ball</b> — match it to reveal every card for a moment.',
  ice:'🧊 <b>Ice</b> — match it and the board locks for 3s while cards keep fading.',
  bomb:'💣 <b>Bomb</b> — match it to add more pairs to the board.',
  recall:'✨ <b>From memory!</b> Matching faded pairs is worth 3× — memorize the board before it fades.',
};
let hintTimer=null;
function maybeHint(kind){
  if(seenSpecials.has(kind) || !HINTS[kind]) return;
  seenSpecials.add(kind); PROG.seenSpecials=PROG.seenSpecials||{}; PROG.seenSpecials[kind]=1; saveProg(PROG);
  const h=$('#hint'); if(!h) return;
  h.innerHTML=HINTS[kind]; h.classList.add('on');
  clearTimeout(hintTimer); hintTimer=setTimeout(()=>h.classList.remove('on'),3800);
}

/* ============== utilities ============== */
const $ = s => document.querySelector(s);
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
function shuffle(arr,rng){for(let i=arr.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function dailyNumber(){const launch=new Date(2024,0,1),n=new Date();const d=new Date(n.getFullYear(),n.getMonth(),n.getDate());return Math.floor((d-launch)/864e5)+1;}
function fmtTime(s){const m=Math.floor(s/60);const ss=(s%60);return m>0?`${m}:${ss.toFixed(0).padStart(2,'0')}`:ss.toFixed(1);}

/* ============== game state ============== */
let G = null;
function newGame(mode, opts){
  opts = opts || {};
  const dn = (opts.dnOverride!=null) ? opts.dnOverride : dailyNumber();
  const seed = mode==='daily' ? dn+1000 : (Math.random()*1e9|0);
  const rng = mulberry32(seed);
  const mod = mode==='daily' ? modForDay(dn) : MODIFIERS[0];
  const total = (mode==='daily'?CFG.DECK_PAIRS_DAILY:CFG.DECK_PAIRS_PRACTICE) + (mode==='daily'?mod.deckAdd:0);

  // build deck of pairs: unique normals + specials (twin-bomb day adds one) seeded at fixed positions
  let specials = SPECIALS.slice();
  if(mode==='daily' && mod.twinBomb) specials.push({emoji:'💣', kind:'bomb'});
  const normals = shuffle(POOL.slice(),rng).slice(0, total - specials.length);
  let deck = normals.map(e=>({emoji:e, kind:'normal'}));
  const fracs=[0.22,0.42,0.62,0.80,0.52];
  specials.forEach((sp,i)=>{ const pos=Math.floor(total*(fracs[i]!=null?fracs[i]:0.3+0.1*i));
    deck.splice(Math.min(pos, deck.length), 0, {emoji:sp.emoji,kind:sp.kind}); });

  // board size: daily is fixed at the canonical window for fair scores; practice honors the setting
  const win = (mode==='daily') ? CFG.WINDOW_PAIRS : (PROG.boardPairs || CFG.WINDOW_PAIRS);

  G = {
    mode, dn, rng, mod, beat:(opts.beat!=null?opts.beat:null), deckPairs:deck, deckIdx:0, total,
    windowPairs:win,
    slotsCount:win*2 + CFG.REFILL_BUFFER,
    cards:[], nextCardId:0, selected:[],
    moves:0, matches:0, wrong:0, combo:0, maxCombo:0, score:0, recalls:0,
    gameTime:0, lastNow:0, raf:null, lockUntil:0,
    freezeWallEnd:0, iceWallEnd:0, revealWallEnd:0,
    matchedLog:[], specialsFired:[], done:false,
  };

  // render empty slots
  const board = $('#board'); board.innerHTML=''; board.style.transform='scale(1)';
  for(let i=0;i<G.slotsCount;i++){const s=document.createElement('div');s.className='slot';s.dataset.slot=i;board.appendChild(s);}

  // fill opening window: draw WINDOW_PAIRS pairs, scatter their two cards across slots
  const order = shuffle([...Array(G.slotsCount).keys()], rng);
  let k=0;
  for(let p=0;p<G.windowPairs;p++){
    const pair = drawPair();
    spawnCard(pair, order[k++]);
    spawnCard(pair, order[k++]);
  }
  updateHUD();
  layoutBoard();
}
function drawPair(){ return G.deckPairs[G.deckIdx++]; }
function hasMorePairs(){ return G.deckIdx < G.deckPairs.length; }

function spawnCard(pair, slotIdx){
  const prog = G.deckIdx/G.total;               // how deep into the deck (for fade ramp)
  const mul = G.mod ? G.mod.fadeMul : 1;
  const life = (CFG.FADE_OPEN + (CFG.FADE_END-CFG.FADE_OPEN)*Math.min(1,prog)) * mul;
  const born = G.gameTime - (G.mod ? G.mod.bornFrac : 0) * life;   // Fog: enters partway faded
  const card = { id:G.nextCardId++, emoji:pair.emoji, kind:pair.kind, slot:slotIdx,
                 born, life, matched:false };
  G.cards.push(card);
  renderCard(card);
  if(card.kind!=='normal') maybeHint(card.kind);
}

function renderCard(card){
  const slot = $(`.slot[data-slot="${card.slot}"]`);
  const t = document.createElement('div');
  t.className='tile'+(card.kind!=='normal'?' special':'');
  t.dataset.id=card.id;
  t.innerHTML=`<span class="emo">${card.emoji}</span>`;
  t.addEventListener('pointerdown',()=>tap(card.id));
  slot.innerHTML=''; slot.appendChild(t);
}

/* ============== fade rendering ============== */
function opacityAt(p){ return CFG.FLOOR + (1-CFG.FLOOR)*Math.pow(1-p, CFG.CURVE); }
// visible fade progress 0..1: stays 0 (fully crisp) through the hold, then ramps to 1 over the rest of life
function fadeAt(c){
  const raw = Math.min(1,(G.gameTime - c.born)/c.life);
  return Math.max(0, (raw - CFG.FADE_HOLD) / (1 - CFG.FADE_HOLD));
}
function paintFades(now){
  const reveal = now < G.revealWallEnd;
  for(const c of G.cards){
    if(c.matched) continue;
    const slot=$(`.slot[data-slot="${c.slot}"]`); if(!slot) continue;
    const el=slot.querySelector('.emo'); if(!el) continue;
    // a card you've flipped lights back to crisp until your second pick resolves the turn
    const lit = reveal || G.selected.includes(c.id);
    const f = lit ? 0 : fadeAt(c);
    el.style.opacity = opacityAt(f);
    // identity (what the card is) is carried by color + sharp shape — destroy both as it fades,
    // while the card "well" keeps position (where the card is) legible.
    const gray = Math.min(1, f / CFG.GRAY_FULL);
    const blur = CFG.MAX_BLUR * Math.max(0, (f - CFG.BLUR_START) / (1 - CFG.BLUR_START));
    el.style.filter = `grayscale(${gray}) blur(${blur.toFixed(2)}px)`;
  }
}

/* ============== interaction ============== */
function tap(id){
  if(G.done) return;
  const now=performance.now();
  if(now < G.iceWallEnd) return;                 // input locked by ice
  if(now < (G.lockUntil||0)) return;             // brief lock after a match (option 2)
  const card=G.cards.find(c=>c.id===id);
  if(!card || card.matched || G.selected.includes(id)) return;
  if(G.selected.length>=2) return;
  G.selected.push(id);
  tileEl(id)?.classList.add('sel');
  if(G.selected.length===2) setTimeout(resolve, CFG.RESOLVE_MS);
}
function tileEl(id){ return $(`.tile[data-id="${id}"]`); }

function resolve(){
  const [a,b]=G.selected.map(id=>G.cards.find(c=>c.id===id));
  G.moves++;
  G.selected=[];
  if(a.emoji===b.emoji){ doMatch(a,b); }
  else { doWrong(a,b); }
  updateHUD();
}

function doMatch(a,b){
  G.matches++; G.combo++; G.maxCombo=Math.max(G.maxCombo,G.combo);
  const fa=fadeAt(a), fb=fadeAt(b);
  const recalled = a.kind==='normal' && Math.min(fa,fb) >= CFG.RECALL_THRESHOLD;   // both cards visibly faded → genuine recall
  const base = CFG.MATCH_BASE * G.combo;
  const gained = recalled ? base*CFG.RECALL_MULT : base;
  G.score += gained;
  if(recalled){ G.recalls++; SFX.recall(); maybeHint('recall'); } else { SFX.match(G.combo); }
  G.matchedLog.push({emoji:a.emoji, kind:a.kind, fade:(fa+fb)/2, recalled});
  [a,b].forEach(c=>{ c.matched=true; const t=tileEl(c.id); if(t){t.classList.remove('sel');t.classList.add(recalled?'recall':'match');} });
  floatText(tileEl(a.id), recalled?`RECALL +${gained}`:`+${gained}`, recalled?'var(--warn)':'var(--good)');
  if(G.combo>=3) comboBurst(G.combo);
  G.lockUntil = performance.now() + CFG.MATCH_COOLDOWN;     // option 2: can't sweep the whole board while it's bright
  // P4: subtle cue when the input lock releases, so fast players feel the unlock window
  clearTimeout(G._unlockCue);
  G._unlockCue = setTimeout(()=>{ if(performance.now() >= (G.lockUntil||0)-8){ SFX.tick(); const bw=$('.boardwrap'); if(bw){ bw.classList.remove('unlock'); void bw.offsetWidth; bw.classList.add('unlock'); } } }, CFG.MATCH_COOLDOWN);
  const freed=[a.slot,b.slot];
  // special effects
  if(a.kind!=='normal'){ G.specialsFired.push(a.emoji); fireSpecial(a.kind); }
  // clear + refill after the pop animation
  setTimeout(()=>{
    freed.forEach(s=>{const sl=$(`.slot[data-slot="${s}"]`); if(sl) sl.innerHTML='';});
    G.cards = G.cards.filter(c=>!c.matched);
    refill(freed);
    checkWin();
    updateHUD();
  }, 380);
}

function doWrong(a,b){
  G.wrong++; G.combo=0;
  SFX.wrong();
  const fa=fadeAt(a), fb=fadeAt(b);
  const penalty = CFG.WRONG_PENALTY + CFG.WRONG_DARK_EXTRA*((fa+fb)/2);   // guessing in the dark costs more (option 3)
  G.gameTime += penalty;
  const t=tileEl(b.id)||tileEl(a.id);
  [a,b].forEach(c=>{const el=tileEl(c.id); if(el){el.classList.remove('sel');el.classList.add('wrong');setTimeout(()=>el.classList.remove('wrong'),420);}});
  floatText(t, `+${penalty.toFixed(1)}s`, 'var(--bad)');
}

function refill(freed){
  // Place the next pair into slots that were ALREADY empty before this match, leaving the
  // just-cleared slots as the new resting gaps. New cards never appear where the player just
  // watched a pair vanish, and the pair's two cards land in scattered (non-adjacent) gaps.
  if(!hasMorePairs()) return;
  const freedSet = new Set(freed);
  const older = shuffle(emptySlotIndices().filter(s=>!freedSet.has(s)), G.rng);
  const pool = older.concat(shuffle(freed.slice(), G.rng));   // fall back to freed only if too few gaps
  const pair = drawPair();
  const a = pool[0], b = pool[1];
  if(a==null) return;
  spawnCard(pair, a);
  if(b!=null) setTimeout(()=>{ if(G && !G.done) spawnCard(pair, b); }, 130);   // partner enters a beat later, elsewhere
}

/* ============== specials ============== */
function fireSpecial(kind){
  const now=performance.now();
  if(kind==='clock'){
    SFX.clock();
    G.freezeWallEnd = now + CFG.CLOCK_FREEZE*1000;
    $('#freezeT').classList.add('on');
    floatBanner('⏳ +5s FROZEN','var(--ice)');
    setTimeout(()=>{$('#freezeT').classList.remove('on');}, CFG.CLOCK_FREEZE*1000);
  }
  else if(kind==='crystal'){
    SFX.crystal();
    G.revealWallEnd = now + CFG.CRYSTAL_REVEAL*1000;
    const f=$('#flash'); f.classList.add('on'); setTimeout(()=>f.classList.remove('on'),140);
    floatBanner('🔮 REVEAL','var(--crisp-soft)');
  }
  else if(kind==='ice'){
    SFX.ice();
    G.iceWallEnd = now + CFG.ICE_LOCK*1000;
    $('#frost').classList.add('on');
    setTimeout(()=>$('#frost').classList.remove('on'), CFG.ICE_LOCK*1000);
  }
  else if(kind==='bomb'){
    SFX.bomb();
    growBoard(CFG.BOMB_ADD_PAIRS);
    floatBanner('💣 +2 PAIRS','var(--crisp)');
  }
}

/* ============== board layout — locks the grid into the viewport, never scrolls ============== */
function layoutBoard(){
  const board=$('#board'); const wrap=board&&board.parentElement;
  if(!board||!wrap) return;
  const cs=getComputedStyle(wrap);
  const availW=wrap.clientWidth  - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
  const availH=wrap.clientHeight - parseFloat(cs.paddingTop)  - parseFloat(cs.paddingBottom);
  if(availW<=0||availH<=0) return;
  const cols=4, gap=9, ratio=4/3;               // slot height = width * 4/3
  const rows=Math.max(1, Math.ceil(G.slotsCount/cols));
  const cellByW=(availW-(cols-1)*gap)/cols;
  const cellByH=((availH-(rows-1)*gap)/rows)/ratio;
  const cell=Math.max(16, Math.min(cellByW, cellByH));   // shrink to whichever axis is tighter
  board.style.width=(cell*cols+(cols-1)*gap)+'px';
  board.style.setProperty('--emo', Math.min(40, Math.round(cell*0.46))+'px');
}

function emptySlotIndices(){
  const occ=new Set(G.cards.map(c=>c.slot));    // matched cards still count as occupied (their slots refill separately)
  const out=[];
  for(let i=0;i<G.slotsCount;i++) if(!occ.has(i)) out.push(i);
  return out;
}

function growBoard(addPairs){
  const board=$('#board');
  G.windowPairs += addPairs;
  const need = addPairs*2;                        // cards the bomb needs to place
  // Always append fresh cells for the bomb's cards so the resting buffer gaps survive the burst.
  const start=G.slotsCount;
  G.slotsCount += need;
  for(let i=0;i<need;i++){const s=document.createElement('div');s.className='slot';s.dataset.slot=start+i;board.appendChild(s);}
  let targets = shuffle([...Array(need).keys()].map(i=>start+i), G.rng);

  // zoom-out beat
  board.style.transform='scale(.9)'; setTimeout(()=>board.style.transform='scale(1)',80);

  let k=0;
  for(let p=0;p<addPairs;p++){
    if(!hasMorePairs()) break;
    const pair=drawPair();
    spawnCard(pair, targets[k++]);
    spawnCard(pair, targets[k++]);
  }
  layoutBoard();                                 // cards scale down if rows grew — no scrollbar, ever
}

/* ============== HUD + FX ============== */
function updateHUD(){
  const remaining = Math.max(0,(G.total - G.matches));
  G.hud = 'combo <b>×'+(G.combo||1)+'</b> | <b>'+remaining+'</b> cards';
  $('#prog').style.width = Math.min(100,(G.matches/G.total)*100)+'%';
}
function floatText(anchor,txt,color){
  if(!anchor) return; const r=anchor.getBoundingClientRect(); const wrap=$('.boardwrap').getBoundingClientRect();
  const f=document.createElement('div'); f.className='float'; f.textContent=txt; f.style.color=color;
  f.style.left=(r.left-wrap.left+r.width/2-12)+'px'; f.style.top=(r.top-wrap.top)+'px';
  $('.boardwrap').appendChild(f); setTimeout(()=>f.remove(),1000);
}
function comboBurst(n){const b=$('#comboBurst');b.textContent='×'+n+'!';b.classList.remove('go');void b.offsetWidth;b.classList.add('go');}
function floatBanner(txt,color){const b=$('#comboBurst');b.style.color=color;b.style.fontSize='28px';b.textContent=txt;b.classList.remove('go');void b.offsetWidth;b.classList.add('go');
  setTimeout(()=>{b.style.fontSize='42px';b.style.color='var(--crisp)';},700);}

/* ============== loop ============== */
function loop(){
  const now=performance.now();
  const dt=now-G.lastNow; G.lastNow=now;
  const frozen = now < G.freezeWallEnd;
  if(!frozen) G.gameTime += dt/1000;
  paintFades(now);
  G.raf=requestAnimationFrame(loop);
}

function checkWin(){
  if(G.done) return;
  if(!hasMorePairs() && G.cards.length===0){ endGame(); }
}

function endGame(){
  G.done=true; cancelAnimationFrame(G.raf);
  SFX.win();
  buildSummary();
  show('summary');
}

/* ============== summary + share ============== */
function fadeBucket(p){ return p<0.34?0 : p<0.67?1 : 2; }

function buildSummary(){
  const isDaily = G.mode==='daily';
  $('#sumTitle').textContent = (isDaily?`#${G.dn}`:'Practice') + (isDaily && G.mod && G.mod.id!=='clear' ? ` · ${G.mod.name}` : '');

  // fade rank headline
  const rank = fadeRank(); G.rank = rank;
  // continuous clarity (0–100): clearing the board is the floor; matching from memory (recall, the 3x-rewarded
  // skill) and sustained combos lift it toward 100. Replaces the shell's old fixed rank->score lookup.
  const normN = G.matchedLog.filter(m=>m.kind==='normal').length || 1;
  const recallRate = Math.min(1, G.recalls / normN);
  const comboRate  = Math.min(1, G.maxCombo / Math.max(6, normN));
  G.clarity = Math.round(Math.max(0, Math.min(100, (G.done?55:30) + 30*recallRate + 15*comboRate)));
  $('#rankBadge').textContent = rank.name;
  $('#rankBadge').style.color = rank.color;
  $('#rankSub').textContent = rank.sub;

  // streak (today's daily only) + challenge result
  const cr = $('#challengeResult');
  if(G.beat!=null){
    const diff = G.beat - G.gameTime;
    if(diff>=0){ cr.textContent = `You beat the challenge by ${diff.toFixed(1)}s 🎉`; cr.style.color='var(--good)'; }
    else { cr.textContent = `Missed it by ${(-diff).toFixed(1)}s — rematch?`; cr.style.color='var(--bad)'; }
  } else if(isDaily){
    const s = recordDailyWin(G.dn, G.gameTime);
    cr.textContent = s>1 ? `🔥 ${s} day streak` : ''; cr.style.color='var(--crisp)';
  } else { cr.textContent=''; }

  // stats
  const stats=$('#sumStats'); stats.innerHTML='';
  [['Time',fmtTime(G.gameTime)+'<small>s</small>'],['Max combo','×'+G.maxCombo],
   ['From memory',(G.recalls||0)+'<small>/'+G.matches+'</small>'],['Score',G.score]]
   .forEach(([k,v])=>{const d=document.createElement('div');d.className='ss';d.innerHTML=`<div class="k">${k}</div><div class="v">${v}</div>`;stats.appendChild(d);});

  // friend-challenge link + share text
  G.challengeUrl = `${location.origin}${location.pathname}?fade=${G.dn}&beat=${G.gameTime.toFixed(1)}`;
  G.shareStr = `FADE ${isDaily?'#'+G.dn:'practice'} — ${rank.name} finish ⏱${fmtTime(G.gameTime)} 🔥×${G.maxCombo}\nBeat me: ${G.challengeUrl}\nMatch them before they fade.`;

  // generate the share image (wait for webfonts so the title renders in Syne)
  const draw=()=>renderShareImage(rank);
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(draw).catch(draw); else draw();

  startCountdown();
}

/* draw the ghost-grid as a branded, cross-platform-consistent share image */
function rrect(x,px,py,w,h,r){ if(x.roundRect){x.beginPath();x.roundRect(px,py,w,h,r);return;}
  x.beginPath();x.moveTo(px+r,py);x.arcTo(px+w,py,px+w,py+h,r);x.arcTo(px+w,py+h,px,py+h,r);x.arcTo(px,py+h,px,py,r);x.arcTo(px,py,px+w,py,r);x.closePath(); }
function renderShareImage(rank){
  try{
    const cols=6, n=G.matchedLog.length, rows=Math.max(1,Math.ceil(n/cols));
    const pad=44, tile=70, gap=11;
    const W=pad*2 + cols*tile + (cols-1)*gap;
    const gridTop=176, gridH=rows*tile+(rows-1)*gap;
    const H=gridTop + gridH + 96;
    const c=document.createElement('canvas'); c.width=W; c.height=H;
    const x=c.getContext('2d');
    x.fillStyle='#0b0a0d'; x.fillRect(0,0,W,H);
    const g=x.createRadialGradient(W*0.82,-40,0,W*0.82,-40,W*0.9);
    g.addColorStop(0,'rgba(62,181,151,0.20)'); g.addColorStop(1,'rgba(62,181,151,0)');
    x.fillStyle=g; x.fillRect(0,0,W,H);
    // title
    x.textBaseline='alphabetic'; x.textAlign='left';
    x.fillStyle='#f4f1ea'; x.font='800 52px Syne, system-ui'; x.fillText('MEMORY', pad, 84);
    x.fillStyle='#8d8896'; x.font='600 20px "Plus Jakarta Sans", system-ui';
    x.fillText((G.mode==='daily'?'#'+G.dn:'practice')+'  ·  ⏱ '+fmtTime(G.gameTime)+'  ·  🔥×'+G.maxCombo, pad, 116);
    // rank pill (top-right)
    x.font='700 22px "Plus Jakarta Sans", system-ui';
    const rt=rank.name, rw=x.measureText(rt).width+34;
    rrect(x, W-pad-rw, 52, rw, 40, 20); x.fillStyle=rank.color; x.globalAlpha=0.18; x.fill(); x.globalAlpha=1;
    rrect(x, W-pad-rw, 52, rw, 40, 20); x.strokeStyle=rank.color; x.lineWidth=1.5; x.stroke();
    x.fillStyle=rank.color; x.textAlign='center'; x.fillText(rt, W-pad-rw/2, 79); x.textAlign='left';
    // ghost grid
    const palette=['#3eb597','#ffd166','#6b7da6'];
    for(let i=0;i<n;i++){
      const r=Math.floor(i/cols), cc=i%cols;
      const px=pad+cc*(tile+gap), py=gridTop+r*(tile+gap);
      const m=G.matchedLog[i];
      rrect(x,px,py,tile,tile,13);
      if(m.kind!=='normal'){ x.fillStyle='rgba(255,176,122,0.16)'; x.fill();
        x.fillStyle='#fff'; x.font='34px system-ui'; x.textAlign='center'; x.textBaseline='middle';
        x.fillText(m.emoji, px+tile/2, py+tile/2+2); x.textAlign='left'; x.textBaseline='alphabetic'; }
      else { x.fillStyle=palette[fadeBucket(m.fade)]; x.fill(); }
    }
    // footer
    x.fillStyle='#807c8a'; x.font='500 16px "Plus Jakarta Sans", system-ui';
    x.fillText('bright → dark · match them before they fade', pad, H-34);
    G.shareCanvas=c;
    $('#shareImg').src=c.toDataURL('image/png');
  }catch(e){ $('#shareImg').style.display='none'; }
}

async function shareResult(){
  const btn=$('#shareBtn');
  const finish=t=>{ btn.textContent=t; setTimeout(()=>btn.textContent='Share result',1800); };
  if(G.shareCanvas && G.shareCanvas.toBlob){
    G.shareCanvas.toBlob(async blob=>{
      const file=new File([blob],`fade-${G.dn}.png`,{type:'image/png'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        try{ await navigator.share({files:[file], text:G.shareStr}); return; }catch(e){}
      }
      try{ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`fade-${G.dn}.png`; a.click(); finish('Image downloaded ✓'); }
      catch(e){ finish('Could not share'); }
    },'image/png');
  } else if(navigator.share){ try{ await navigator.share({text:G.shareStr}); }catch(e){} }
  else { copyResult(); }
}

async function copyResult(){
  const btn=$('#copyBtn');
  try{ await navigator.clipboard.writeText(G.shareStr); btn.textContent='Copied ✓'; }
  catch(e){ btn.textContent='Copy unavailable here'; }
  setTimeout(()=>btn.textContent='Copy share text',1800);
}

/* ============== screens ============== */
function show(name){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on')); $('#'+name).classList.add('on'); }

function runCountdown(then){
  const ovl=$('#countdownOvl'), num=$('#cdNum');
  const steps=['3','2','1','Go!'];
  let i=0;
  ovl.classList.add('on');
  const step=()=>{
    num.textContent=steps[i];
    num.classList.remove('go'); void num.offsetWidth; num.classList.add('go');
    if(steps[i]==='Go!') SFX.go(); else SFX.tick();
    i++;
    if(i<steps.length) setTimeout(step, 720);
    else setTimeout(()=>{ ovl.classList.remove('on'); then(); }, 480);
  };
  step();
}

function start(mode, opts){
  ac();                       // unlock audio within the user gesture
  newGame(mode, opts);        // cards spawn crisp; the loop (timer + fade) hasn't started yet
  show('game');
  requestAnimationFrame(layoutBoard);
  G.lastNow=performance.now();
  G.raf=requestAnimationFrame(loop);
}

/* ============== wire up ============== */
const today = dailyNumber();
$('#dailyLbl').textContent='MEMORY #'+today;

// streak + today's modifier on the intro
(function initIntro(){
  const s=currentStreak();
  $('#introStreak').textContent = s>0 ? `🔥 ${s} day streak` : '';
  const m=modForDay(today);
  $('#dailyLbl').textContent = 'MEMORY #'+today + (m.id!=='clear' ? ' · '+m.name : '');
  $('#introMod').textContent = m.id!=='clear' ? m.desc : '';
  if(CHALLENGE){
    const cd=$('#introChallenge'); cd.classList.add('on');
    cd.innerHTML = CHALLENGE.beat!=null
      ? `A friend challenged you on <b>MEMORY #${CHALLENGE.dn}</b><br>Beat their time: <b>⏱${fmtTime(CHALLENGE.beat)}</b>`
      : `A friend shared <b>MEMORY #${CHALLENGE.dn}</b> — can you clear it?`;
    $('#playDaily').firstChild.textContent='Accept Challenge';
    $('#dailyLbl').textContent='MEMORY #'+CHALLENGE.dn;
    $('#introMod').textContent='';
  }
})();

// ambient background: faint cards fading in and out (echoes the game mechanic), ~3 at a time
(function introBg(){
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const bg=$('#introBg'); if(!bg) return;
  const COLS=5, ROWS=8, MAX=3;
  const cells=[]; for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) cells.push([r,c]); // mask keeps them in the open middle
  const busy=new Set(); let count=0;
  function spawn(){
    if(count>=MAX || !$('#intro').classList.contains('on')) return;
    const free=cells.filter(([r,c])=>!busy.has(r+'-'+c));
    if(!free.length) return;
    const [r,c]=free[(Math.random()*free.length)|0], key=r+'-'+c;
    busy.add(key); count++;
    const el=document.createElement('div');
    el.className='introGhost'; el.style.gridRow=r+1; el.style.gridColumn=c+1;
    el.textContent=POOL[(Math.random()*POOL.length)|0];
    el.addEventListener('animationend',()=>{ el.remove(); busy.delete(key); count--; });
    bg.appendChild(el);
  }
  spawn(); setTimeout(spawn,600); setTimeout(spawn,1300);
  setInterval(spawn, 1200);
})();

$('#playDaily').addEventListener('click',()=>{
  if(CHALLENGE) start('daily',{dnOverride:CHALLENGE.dn, beat:CHALLENGE.beat});
  else start('daily');
});
$('#playPractice').addEventListener('click',()=>start('practice'));
$('#shareBtn').addEventListener('click',shareResult);
$('#copyBtn').addEventListener('click',copyResult);
$('#againBtn').addEventListener('click',()=>{ if(G&&G.raf)cancelAnimationFrame(G.raf); clearInterval(cdTimer); show('intro'); });
window.addEventListener('resize',()=>{ if(G) layoutBoard(); });

// theme + persisted prefs (in-game settings panel removed; defaults: sound on, dark, standard board)
function applyTheme(t){ document.body.setAttribute('data-theme', t); PROG.theme=t; saveProg(PROG); }
PROG.theme = 'dark';   // light theme retired with the settings panel; force dark (legacy light palette is not AA-compliant)
PROG.boardPairs = PROG.boardPairs || CFG.WINDOW_PAIRS;
applyTheme(PROG.theme);
<\/script>

<script type="text/html" id="g-spatial"><!doctype html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0a0d; --bg2:#141218; --face:#262130; --face2:#1d1925;
    --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.16);
    --text:#f4f1ea; --muted:#8d8896; --muted2:#807c8a;
    --crisp:#4fb0e4; --crisp-soft:#93cdf0; --glow:rgba(79,176,228,.3); --good:#5fd6a0; --bad:#ff5f6d;
    --disp:'Plus Jakarta Sans',system-ui,sans-serif; --logo:'Syne',system-ui,sans-serif; --mono:'Plus Jakarta Sans',system-ui,sans-serif;
    --s:64px; --half:32px; --mini:46px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%}
  body{background:
      radial-gradient(900px 500px at 80% -12%, rgba(79,176,228,.07), transparent 55%),
      radial-gradient(800px 500px at -8% 112%, rgba(107,125,166,.08), transparent 55%),
      var(--bg);
    color:var(--text);font-family:var(--disp);-webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:16px 16px max(18px,env(safe-area-inset-bottom));height:100%;overflow:hidden}
  .wrap{width:100%;max-width:440px;height:100%;display:flex;flex-direction:column;align-items:center}
  .stage{flex:1;min-height:0;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
  .stageInner{width:100%;display:flex;flex-direction:column;align-items:center;transform-origin:center}

  .rcount{font-family:var(--logo);font-size:13px;letter-spacing:.16em;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:2px}
  .prompt{font-size:18px;color:var(--text);margin:14px 0 4px;text-align:center;font-weight:600}
  .hint{font-size:13px;color:var(--muted2);margin-bottom:12px;text-align:center;letter-spacing:.01em}

  /* ---- 3D scene / cube ---- */
  .scene{perspective:660px; position:relative; z-index:1}
  .net{position:relative;width:var(--s);height:var(--s);transform-style:preserve-3d}
  .face{position:absolute;top:50%;left:50%;width:var(--s);height:var(--s);margin:calc(var(--half)*-1) 0 0 calc(var(--half)*-1);
    display:flex;align-items:center;justify-content:center;border-radius:11px;
    background:linear-gradient(155deg,var(--face),var(--face2));border:1px solid var(--line2);
    font-size:calc(var(--s)*.46);backface-visibility:hidden;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
  .face.blank{background:linear-gradient(155deg,#201c28,#171420);border-color:var(--line)}
  .face .glyph{display:inline-block; will-change:opacity,filter; transition:opacity .25s ease, filter .25s ease}

  /* folded cube (canonical assembly — faces carry their cube-face emoji) */
  .net.folded{transition:transform .55s cubic-bezier(.34,1.2,.5,1), opacity .45s ease}
  .net.snap .face{transition:transform .55s cubic-bezier(.34,1.2,.5,1)}
  .net.folded{transform:rotateX(-22deg) rotateY(-32deg)}
  .net.folded.spin{animation:spin 15s linear infinite}
  #net.folded{filter:none}   /* filter would flatten transform-style; the win glow lives on #winGlow instead */
  @keyframes spin{from{transform:rotateX(-18deg) rotateY(-20deg)}to{transform:rotateX(-18deg) rotateY(340deg)}}
  .net.folded .f{transform:translateZ(var(--half))}
  .net.folded .u{transform:rotateX(90deg) translateZ(var(--half))}
  .net.folded .d{transform:rotateX(-90deg) translateZ(var(--half))}
  .net.folded .l{transform:rotateY(-90deg) translateZ(var(--half))}
  .net.folded .r{transform:rotateY(90deg) translateZ(var(--half))}
  .net.folded .b{transform:rotateY(180deg) translateZ(var(--half))}

  /* ── resolution drama ── */
  .winGlow{position:absolute; left:50%; top:50%; width:64px; height:64px; margin:-32px 0 0 -32px; border-radius:50%; pointer-events:none; opacity:0; z-index:0;
    background:radial-gradient(circle, rgba(79,176,228,.55), rgba(79,176,228,0) 70%)}
  .winGlow.go{animation:glowBurst .9s ease-out}
  @keyframes glowBurst{0%{opacity:0; transform:scale(.3)} 22%{opacity:.85} 100%{opacity:0; transform:scale(6)}}
  .cand.chosen{border-color:rgba(79,176,228,.7); box-shadow:0 0 0 1px rgba(79,176,228,.35)}
  .net.crumble{animation:crumble 1s cubic-bezier(.5,.05,.7,1) forwards}
  @keyframes crumble{
    0%{transform:rotateX(-22deg) rotateY(-32deg) scale(1); filter:none}
    18%{transform:rotateX(-20deg) rotateY(-6deg) scale(1.03); filter:none}                                  /* leans toward the chosen orientation */
    30%{transform:rotateX(-28deg) rotateY(-44deg) translate(-5px,2px) scale(1.01); filter:contrast(1.7) hue-rotate(14deg)}
    40%{transform:rotateX(-14deg) rotateY(-22deg) translate(6px,-3px) scale(1); filter:contrast(.7) hue-rotate(-16deg)}
    50%{transform:rotateX(-34deg) rotateY(-52deg) translate(-6px,4px) scale(1.02); filter:contrast(1.9) saturate(1.7)}  /* glitch — geometry rejects it */
    60%{transform:rotateX(-18deg) rotateY(-28deg) translate(3px,-2px) scale(.97); filter:none}
    100%{transform:rotateX(-72deg) rotateY(86deg) scale(.32); opacity:0; filter:none}                       /* breaks apart */
  }
  .net.crumble .glyph{animation:glitchFlick .5s steps(1) 2}
  @keyframes glitchFlick{0%,100%{opacity:1} 25%{opacity:.15} 50%{opacity:.7} 75%{opacity:.1}}

  .netbox{height:clamp(210px,44vh,400px);display:flex;align-items:center;justify-content:center;width:100%;flex:none;position:relative}

  /* ---- candidates (sticky footer) ---- */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;flex:none;margin-top:8px}
  .cand{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:6px 14px;
    display:flex;flex-direction:row;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s,transform .1s,box-shadow .2s;position:relative}
  .cand:hover{border-color:var(--line2)}
  .cand:active{transform:translateY(1px)}
  .cand .lbl{font-size:13px;color:var(--muted2);letter-spacing:.12em;flex:none;width:18px;text-align:center;margin:0}
  .cand .miniscene{flex:1;perspective:540px;height:80px;display:flex;align-items:center;justify-content:center}
  .cand.correct{border-color:var(--good);box-shadow:0 0 0 1px var(--good),0 10px 26px rgba(95,214,160,.18);animation:pop .42s ease}
  .cand.wrong{border-color:var(--bad);box-shadow:0 0 0 1px var(--bad)}
  @keyframes pop{0%{transform:scale(1)} 42%{transform:scale(1.07)} 100%{transform:scale(1)}}
  .cand .verdict{position:absolute;top:9px;right:11px;font-size:15px;font-weight:700;opacity:0}
  .cand.correct .verdict,.cand.wrong .verdict{opacity:1}
  .cand.correct .verdict{color:var(--good)} .cand.wrong .verdict{color:var(--bad)}

  .result{margin-top:12px;text-align:center;min-height:42px;opacity:0;transition:opacity .4s}
  .result.show{opacity:1}
  .result .big{font-family:var(--logo);font-size:22px;margin-bottom:4px}
  .result .big.win{color:var(--good)} .result .big.lose{color:var(--bad)}
  .result .exp{font-size:13px;color:var(--muted);line-height:1.4;max-width:330px;margin:0 auto}

  /* ===== unified game HUD ===== */
  .gameHud{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:12px 16px 6px;flex:none}
  .gameHud .stat{display:flex;flex-direction:column;gap:2px}
  .gameHud .stat.r{align-items:flex-end;text-align:right}
  .gameHud .stat .k{font-family:var(--mono,ui-monospace,Menlo,monospace);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2);line-height:1}
  .gameHud .stat .v{font-family:var(--mono,ui-monospace,Menlo,monospace);font-size:18px;font-weight:700;line-height:1.05;font-variant-numeric:tabular-nums}
  .gameHud .stat .v.accent{color:var(--crisp)}
  @media (max-height:680px){ .netbox{height:200px} .prompt{font-size:15px;margin:8px 0 2px} .hint{margin-bottom:8px} :root{--mini:40px} .cand .miniscene{height:66px} }
</style>

<body>
<div class="wrap">
  <div class="stage"><div class="stageInner">
    <div class="prompt">Which cube folds from this net?</div>
    <div class="netbox"><div class="winGlow" id="winGlow"></div><div class="scene"><div class="net" id="net"></div></div></div>
    <div class="result" id="result">
      <div class="big" id="rbig"></div>
      <div class="exp" id="rexp"></div>
    </div>
  </div></div>

  <div class="grid" id="grid"></div>
</div>

<script>
"use strict";
/* ---- audio: shared palette (matches the other legs) ---- */
let AC=null, SND=true;
function ac(){ try{ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); }catch(e){} return AC; }
function tone(freq,dur,type,gain,delay){ if(!SND) return; const c=ac(); if(!c) return;
  const t=c.currentTime+(delay||0); const o=c.createOscillator(), g=c.createGain();
  o.type=type||'sine'; o.frequency.value=freq; o.connect(g); g.connect(c.destination);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(gain||0.16,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.03); }
function buzz(p){ if(navigator.vibrate){ try{navigator.vibrate(p);}catch(e){} } }
const SFX={
  tap(){ tone(440,0.09,'sine',0.12); buzz(8); },
  good(){ [660,880,1175].forEach((f,i)=>tone(f,0.13,'triangle',0.13,i*0.05)); buzz([0,10,22,16]); },
  wrong(){ tone(150,0.18,'square',0.12); buzz([0,28,28,28]); },
  fold(){ tone(300,0.10,'sine',0.13); tone(150,0.18,'sine',0.10,0.05); buzz(14); },
};
const $=s=>document.querySelector(s);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const POOL=['🍓','🔔','🌙','⚡','🍄','🎈','🦊','🍋','🌵','🚀','🌸','🐙','🦋','🍒','🪐','🧩','🍉','🌻','🥑','🐢'];

// ---- deterministic daily RNG ----
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function dailyNumber(){const launch=new Date(2024,0,1),n=new Date();const d=new Date(n.getFullYear(),n.getMonth(),n.getDate());return Math.floor((d-launch)/864e5)+1;}
function shuffle(a,rng){for(let i=a.length-1;i>0;i--){const j=(rng()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

// ---- cube-net generator: unroll a random spanning tree of the cube face graph ----
// orientation slots map to cube faces; opposites are always (out,in)(up,down)(left,right) → F/B, U/D, L/R.
const DELTA={right:[1,0],left:[-1,0],up:[0,-1],down:[0,1]};
function roll(o,dir){
  if(dir==='right') return {out:o.right,right:o.in,in:o.left,left:o.out,up:o.up,down:o.down};
  if(dir==='left')  return {out:o.left,left:o.in,in:o.right,right:o.out,up:o.up,down:o.down};
  if(dir==='up')    return {out:o.up,up:o.in,in:o.down,down:o.out,left:o.left,right:o.right};
  return {out:o.down,down:o.in,in:o.up,up:o.out,left:o.left,right:o.right};   // down
}
function genNet(rng){
  const root={out:'F',in:'B',up:'U',down:'D',left:'L',right:'R'};
  const placed={}, occ={};
  (function visit(face,col,row,o){
    placed[face]={col,row}; occ[col+','+row]=1;
    for(const dir of shuffle(['right','left','up','down'],rng)){
      const nf=o[dir]; if(placed[nf]) continue;
      const nc=col+DELTA[dir][0], nr=row+DELTA[dir][1];
      if(occ[nc+','+nr]) continue;
      visit(nf,nc,nr,roll(o,dir));
    }
  })('F',0,0,root);
  return placed;
}

const FOLD_CFG={PRE:3.2, LIFE:2.6, CURVE:1.4, FLOOR:0.08, BLUR:6};   // uniform read-window then fade
let answered=false, foldRAF=0, foldT0=0, roundT0=0, faces=null, cands=null;
window.G={i:0, n:3, correct:0, done:false, score:0, roundScores:[]};

function sizeNet(wCells,hCells){
  const nb=$('.netbox'); if(!nb) return;
  const W=nb.clientWidth-14, H=nb.clientHeight-14;
  // a folded cube's silhouette ≈ 1.4 × its edge, so size a flat net face to that footprint → identical on-screen size
  const mini=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--mini'))||46;
  let s=Math.floor(Math.min(W/wCells, H/hCells, Math.round(mini*1.4))); s=Math.max(24,s);
  document.documentElement.style.setProperty('--s', s+'px');
  document.documentElement.style.setProperty('--half', (s/2)+'px');
}
function sizeCube(){
  const nb=$('.netbox'); const m=Math.min(nb.clientWidth, nb.clientHeight);
  let s=clamp(Math.floor(m*0.66), 60, 124);
  document.documentElement.style.setProperty('--s', s+'px');
  document.documentElement.style.setProperty('--half', (s/2)+'px');
}

function buildNet(em, net){
  const el=$('#net'); el.className='net'; el.innerHTML=''; el.style.transform='';
  const ps=Object.values(net), cols=ps.map(p=>p.col), rows=ps.map(p=>p.row);
  const minC=Math.min(...cols),maxC=Math.max(...cols),minR=Math.min(...rows),maxR=Math.max(...rows);
  const cx=(minC+maxC)/2, cy=(minR+maxR)/2;
  sizeNet(maxC-minC+1, maxR-minR+1);
  ['F','U','D','L','R','B'].forEach(face=>{
    const p=net[face]; const d=document.createElement('div');
    d.className='face '+face.toLowerCase();
    d.innerHTML='<span class="glyph">'+em[face]+'</span>';
    d.style.transform=`translate(${(p.col-cx)*100}%, ${(p.row-cy)*100}%)`;
    el.appendChild(d);
  });
}
// candidate mini-cube showing top/front/right
function miniCube(em,c){
  const e=k=>em[c[k]];
  return `<div class="net folded" style="--s:var(--mini);--half:calc(var(--mini)/2)">
    <div class="face f">${e('front')}</div>
    <div class="face u">${e('top')}</div>
    <div class="face r">${e('right')}</div>
    <div class="face d blank"></div><div class="face l blank"></div><div class="face b blank"></div>
  </div>`;
}

function generate(){
  answered=false;
  const rng=mulberry32(dailyNumber()*977 + G.i*5179 + 11);
  G.hud='Cube <b>'+(G.i+1)+'/'+G.n+'</b>';
  // 6 distinct emoji → cube faces; net layout varies daily
  const pick=shuffle(POOL.slice(),rng).slice(0,6);
  faces={F:pick[0],U:pick[1],D:pick[2],L:pick[3],R:pick[4],B:pick[5]};
  buildNet(faces, genNet(rng));

  // a visible cube shows 3 mutually-adjacent faces. correct = a real corner {U,F,R};
  // distractors each smuggle in one opposite pair (F-B, U-D or L-R) → impossible to see together.
  cands=shuffle([
    {top:'U',front:'F',right:'R',ok:true},
    {top:'U',front:'F',right:'B',ok:false},   // F & B opposite
    {top:'U',front:'D',right:'R',ok:false},   // U & D opposite
    {top:'L',front:'F',right:'R',ok:false},   // L & R opposite
  ],rng);

  const grid=$('#grid'); grid.innerHTML='';
  cands.forEach((c,i)=>{
    const el=document.createElement('div'); el.className='cand';
    el.innerHTML=`<div class="verdict"></div><div class="lbl">${String.fromCharCode(65+i)}</div><div class="miniscene">${miniCube(faces,c)}</div>`;
    el.addEventListener('click',()=>answer(i));
    grid.appendChild(el);
  });

  $('#result').classList.remove('show');
  roundT0=performance.now(); foldT0=roundT0;
  cancelAnimationFrame(foldRAF); foldRAF=requestAnimationFrame(fadeTick);
  requestAnimationFrame(fit);
}

function fadeTick(now){
  if(answered) return;
  const e=(now-foldT0)/1000 - FOLD_CFG.PRE;
  const f = e<=0?0:Math.min(1, Math.pow(Math.min(1,e/FOLD_CFG.LIFE), FOLD_CFG.CURVE));
  const gray=Math.min(1,f/0.6), blur=FOLD_CFG.BLUR*Math.max(0,(f-0.3)/0.7);
  document.querySelectorAll('#net .glyph').forEach(g=>{
    g.style.opacity = 1-(1-FOLD_CFG.FLOOR)*f;
    g.style.filter=`grayscale(${gray}) blur(${blur.toFixed(2)}px)`;
  });
  foldRAF=requestAnimationFrame(fadeTick);
}

function answer(i){
  if(answered) return; answered=true;
  SFX.tap();
  cancelAnimationFrame(foldRAF);
  const win=cands[i].ok;
  // scoring: correctness + memory bonus (more credit the more the net had faded when you answered)
  const t=(performance.now()-roundT0)/1000;
  const memFrac=clamp((t-FOLD_CFG.PRE)/FOLD_CFG.LIFE,0,1);
  const MAX=100/G.n, BASE=MAX*0.66, MEM=MAX*0.34;
  G.roundScores.push(win ? BASE+MEM*memFrac : 0);
  if(win) G.correct++;

  // freeze input; mark only the tapped card — verdicts (✓/✗) are revealed after the cube resolves
  document.querySelectorAll('.cand').forEach((card,idx)=>{
    card.style.pointerEvents='none';
    if(idx===i) card.classList.add('chosen');
  });

  // assemble: the net snaps crisp and folds into the 3D cube it actually makes
  document.querySelectorAll('#net .glyph').forEach(g=>{g.style.opacity='1';g.style.filter='none';});
  const net=$('#net');
  sizeCube();
  net.querySelectorAll('.face').forEach(f=>{ f.style.transform=''; });
  net.classList.remove('spin','crumble');
  net.classList.add('snap');
  requestAnimationFrame(()=>{ net.classList.add('folded'); SFX.fold(); });
  requestAnimationFrame(fit);

  if(win){
    // ── correct: it locks, a radial burst blooms, then the majestic spin ──
    setTimeout(()=>{ SFX.good(); burstGlow(); }, 540);
    setTimeout(()=>net.classList.add('spin'), 1350);
    showResult('Folded it.', 'win', "Three faces, one honest corner — that's the cube.", 780);
    revealVerdicts(i, 1450);
    advanceAfter(2950);
  } else {
    // ── wrong: cube leans toward the chosen orientation, the impossible pair rejects, it breaks apart ──
    setTimeout(()=>{ net.classList.add('crumble'); SFX.wrong(); }, 650);
    // …then reforms into the real cube so the player still learns, with a calm reveal spin
    setTimeout(()=>{ net.classList.remove('crumble'); }, 1650);
    setTimeout(()=>net.classList.add('spin'), 2250);
    showResult('Impossible.', 'lose', "Those two faces sit opposite — they can't share a corner. The real cube:", 1700);
    revealVerdicts(i, 1750);
    advanceAfter(3300);
  }
}
function showResult(big, cls, exp, ms){
  setTimeout(()=>{ $('#rbig').textContent=big; $('#rbig').className='big '+cls; $('#rexp').innerHTML=exp; $('#result').classList.add('show'); }, ms);
}
function revealVerdicts(i, ms){
  setTimeout(()=>{
    document.querySelectorAll('.cand').forEach((card,idx)=>{
      const v=card.querySelector('.verdict');
      if(cands[idx].ok){ card.classList.add('correct'); if(v) v.textContent='✓'; }
      else if(idx===i){ card.classList.add('wrong'); if(v) v.textContent='✗'; }
    });
  }, ms);
}
function burstGlow(){ const g=$('#winGlow'); if(g){ g.classList.remove('go'); void g.offsetWidth; g.classList.add('go'); } }
function advanceAfter(ms){
  setTimeout(()=>{
    if(G.i < G.n-1){ G.i++; generate(); }
    else { G.score=clamp(Math.round(G.roundScores.reduce((a,b)=>a+b,0)),0,100); G.done=true; }
  }, ms);
}

// keep the stage content scaled to fit above the pinned A-D footer
function fit(){
  const stage=$('.stage'), inner=$('.stageInner'); if(!stage||!inner) return;
  inner.style.transform='';
  const k=Math.min(1, stage.clientHeight/(inner.offsetHeight||1));
  inner.style.transform = k<1 ? 'scale('+k.toFixed(3)+')' : '';
}
window.addEventListener('resize', fit);
window.start=function(){ G={i:0, n:3, correct:0, done:false, score:0, roundScores:[]}; generate(); };
generate();
<\/script>

<body>
<div id="app">
  <div class="swipeFX" id="swipeFX"></div>

    </div>

    <div class="mark"><span>S</span><span>P</span><span>E</span><span>E</span><span>D</span></div>

  </section>

<script>
"use strict";
const $=s=>document.querySelector(s);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

const CFG={ PER_WAVE:5, WAVES:60, START_MS:2400, FLOOR_MS:760, DECAY:18 };
// dimensions for the Slapzi-style "match the target on a trait" rule
const DIMS={
  kind:  {label:'KIND',  tags:['animal','plant','food','vehicle','sky']},
  colour:{label:'COLOUR',tags:['red','yellow']},
  trait: {label:'TRAIT', tags:['fly','water','big']},
};
const LIB=[
  {e:'🦊',t:['animal']},{e:'🐙',t:['animal','water']},{e:'🦋',t:['animal','fly']},{e:'🐝',t:['animal','fly','yellow']},
  {e:'🐬',t:['animal','water']},{e:'🦈',t:['animal','water','big']},{e:'🐳',t:['animal','water','big']},{e:'🦀',t:['animal','water','red']},
  {e:'🦅',t:['animal','fly']},{e:'🦉',t:['animal','fly']},{e:'🐦',t:['animal','fly']},{e:'🦜',t:['animal','fly']},
  {e:'🐘',t:['animal','big']},{e:'🦒',t:['animal','big']},{e:'🐎',t:['animal','big']},{e:'🐢',t:['animal','water']},
  {e:'🐠',t:['animal','water']},{e:'🐜',t:['animal']},{e:'🐍',t:['animal']},
  {e:'🌵',t:['plant']},{e:'🌹',t:['plant','red']},{e:'🌻',t:['plant','yellow']},{e:'🌳',t:['plant','big']},
  {e:'🌲',t:['plant','big']},{e:'🌷',t:['plant']},{e:'🍀',t:['plant']},
  {e:'🍓',t:['food','red']},{e:'🍎',t:['food','red']},{e:'🍌',t:['food','yellow']},{e:'🍋',t:['food','yellow']},
  {e:'🍒',t:['food','red']},{e:'🍅',t:['food','red']},{e:'🌽',t:['food','yellow']},
  {e:'🧀',t:['food','yellow']},{e:'🍕',t:['food']},{e:'🍔',t:['food']},{e:'🍩',t:['food']},
  {e:'🥕',t:['food']},{e:'🥑',t:['food']},{e:'🍇',t:['food']},{e:'🍞',t:['food']},
  {e:'🚗',t:['vehicle']},{e:'🚕',t:['vehicle','yellow']},{e:'🚌',t:['vehicle','big']},{e:'🚲',t:['vehicle']},
  {e:'🚜',t:['vehicle','big']},{e:'🚒',t:['vehicle','red','big']},{e:'🚂',t:['vehicle','big']},
  {e:'✈️',t:['vehicle','fly','big']},{e:'🚀',t:['vehicle','fly','big']},{e:'🚁',t:['vehicle','fly']},
  {e:'🚢',t:['vehicle','big']},{e:'⛵',t:['vehicle']},
  {e:'☀️',t:['sky','yellow','big']},{e:'🌙',t:['sky']},{e:'⭐',t:['sky','yellow']},{e:'☁️',t:['sky']},
  {e:'🌈',t:['sky']},{e:'⚡',t:['sky','yellow']},
];

/* ---- deterministic daily RNG ---- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function dailyNumber(){const launch=new Date(2024,0,1),n=new Date();const d=new Date(n.getFullYear(),n.getMonth(),n.getDate());return Math.floor((d-launch)/864e5)+1;}
function shuffle(a,rng){for(let i=a.length-1;i>0;i--){const j=(rng()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ---- WebAudio juice ---- */
let AC=null;
function actx(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return AC; }
function tone(freq,dur,type,gain){ const a=actx(); if(!a) return; const o=a.createOscillator(),g=a.createGain();
  o.type=type||'sine'; o.frequency.value=freq; o.connect(g); g.connect(a.destination);
  const t=a.currentTime; g.gain.setValueAtTime(gain||0.06,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur+0.02); }
function hit(combo){ const semi=Math.min(combo,14); tone(392*Math.pow(2,semi/12),0.13,'triangle',0.07); }
function bust(){ tone(180,0.32,'sawtooth',0.09); setTimeout(()=>tone(120,0.34,'sawtooth',0.08),60); }
function haptic(ms){ if(navigator.vibrate){ try{navigator.vibrate(ms);}catch(e){} } }

/* ---- deterministic survival stream ---- */
function buildStream(seed){
  const rng=mulberry32(seed*2654435761>>>0);
  const dimKeys=Object.keys(DIMS);
  const stream=[];
  for(let w=0; w<CFG.WAVES; w++){
    const dim=dimKeys[(rng()*dimKeys.length)|0];
    const tags=DIMS[dim].tags;
    const tag=tags[(rng()*tags.length)|0];
    const target=shuffle(LIB.filter(x=>x.t.includes(tag)),rng)[0] || LIB[0];
    const rule={dim:DIMS[dim].label, target:target.e, tag};
    const fit=shuffle(LIB.filter(x=>x.t.includes(tag) && x.e!==target.e),rng);
    const non=shuffle(LIB.filter(x=>!x.t.includes(tag)),rng);
    const nFit = rng()<0.5 ? 2 : 3;   // vary so the run isn't biased toward one swipe direction
    const chosen=shuffle([...fit.slice(0,nFit),...non.slice(0,CFG.PER_WAVE-nFit)],rng);
    chosen.forEach(it=>stream.push({e:it.e, rule, w, fits:it.t.includes(tag)}));
  }
  return stream;
}

let dragging=false, dragX=0;
const SWIPE_MIN=48;   // low activation distance for fast flicks
window.G=null;

function start(){
  actx() && AC.resume && AC.resume();
  G={ stream:buildStream(dailyNumber()), i:0, streak:0, combo:0, maxCombo:0, score:0, done:false, cardEl:null, lastWave:-1 };
  show('game'); updateHUD(); nextCard();
}
function updateHUD(){ $('#combo .v').textContent='×'+(G.combo||1); $('#streak .v').textContent=G.streak; }
function cardMs(){ return CFG.FLOOR_MS + (CFG.START_MS-CFG.FLOOR_MS)*Math.exp(-G.streak/CFG.DECAY); }

function nextCard(){
  if(!G || G.done) return;
  if(G.i>=G.stream.length){ return win(); }   // survived the whole deck
  const card=G.stream[G.i];
  $('#ruleDim').textContent=card.rule.dim;
  $('#ruleTgt').textContent=card.rule.target;
  if(card.w!==G.lastWave){ G.lastWave=card.w; const rb=$('#rulebar'); rb.classList.remove('flash'); void rb.offsetWidth; rb.classList.add('flash'); }
  const el=document.createElement('div'); el.className='swipecard in';
  el.innerHTML=`<span>${card.e}</span><div class="bar"><i></i></div>`;
  $('#arena').appendChild(el);
  G.cardEl=el; dragX=0;
  attachDrag(el);
  const bar=el.querySelector('.bar i'), ms=cardMs();
  bar.style.transition=`transform ${ms}ms linear`;
  requestAnimationFrame(()=>{ bar.style.transform='scaleX(0)'; });
  bar.addEventListener('transitionend',()=>{ if(el===G.cardEl) resolve(null); },{once:true});
}

function attachDrag(el){
  let startX=0;
  el.addEventListener('pointerdown',e=>{dragging=true;startX=e.clientX;el.setPointerCapture(e.pointerId);});
  el.addEventListener('pointermove',e=>{ if(!dragging)return; dragX=e.clientX-startX;
    el.style.transform=`translateX(${dragX}px) rotate(${dragX*0.08}deg)`;
    const fx=$('#swipeFX'); if(fx){ fx.style.setProperty('--fx', dragX>0?'#5fd6a0':'#ff5f6d'); fx.style.opacity=Math.min(0.85, Math.abs(dragX)/SWIPE_MIN); } });
  el.addEventListener('pointerup',()=>{ if(!dragging)return; dragging=false;
    const fx=$('#swipeFX'); if(fx) fx.style.opacity=0;
    if(Math.abs(dragX)>SWIPE_MIN) resolve(dragX>0); else el.style.transform=''; });
  el.addEventListener('pointercancel',()=>{ dragging=false; const fx=$('#swipeFX'); if(fx) fx.style.opacity=0; el.style.transform=''; });
}

function resolve(answer){            // answer: true=yes, false=no, null=timeout
  const el=G.cardEl; if(!el) return; G.cardEl=null;
  const card=G.stream[G.i];
  const correct = answer!==null && answer===card.fits;
  const v=$('#verdict');
  v.textContent = correct?'✓':(answer===null?'⏱':'✗');
  v.className='verdict show '+(correct?'good':'bad');
  el.classList.remove('in');
  el.classList.add(answer===false?'go-left':(answer===true?'go-right':(card.fits?'go-right':'go-left')));
  setTimeout(()=>el.remove(),240);

  if(correct){
    G.streak++; G.combo++; G.maxCombo=Math.max(G.maxCombo,G.combo);
    hit(G.combo); haptic(8);
    const c=$('#combo'); c.classList.add('pulse'); setTimeout(()=>c.classList.remove('pulse'),180);
    G.i++; updateHUD();
    setTimeout(nextCard, 210);
  } else {
    bust(); haptic(40);
    G.combo=0; updateHUD();
    setTimeout(()=>finish(false, card), 360);
  }
}

function scoreFor(streak){ return Math.round(100*(1-Math.exp(-streak/16))); }
function win(){ finish(true, null); }

function finish(survived, card){
  if(G.done) return;
  G.done=true; G.score=scoreFor(G.streak); G.cardEl=null;
  $('#sumTitle').textContent = survived ? 'cleared the deck' : 'survival';
  $('#bigStreak').textContent=G.streak;
  $('#bigLab').textContent='card streak';
  const stats=$('#sumStats'); stats.innerHTML='';
  const tier = G.streak>=35?'RELENTLESS': G.streak>=22?'SHARP': G.streak>=12?'STEADY':'WARMING UP';
  [['Streak',G.streak],['Max combo','×'+G.maxCombo],['Rating',tier],['Score',G.score]]
    .forEach(([k,v])=>{const d=document.createElement('div');d.className='ss';d.innerHTML=`<div class="k">${k}</div><div class="v">${v}</div>`;stats.appendChild(d);});
  const blocks='🟩'.repeat(Math.min(10,Math.round(G.streak/4)));
  G.share=`SPEED #${dailyNumber()} — streak ${G.streak} 🔥×${G.maxCombo}\n${blocks||'▫️'}\nHow long can you keep up?`;
  $('#shareBox').textContent=G.share;
  show('summary');
}

async function copyResult(){
  const b=$('#copyBtn');
  try{ await navigator.clipboard.writeText(G.share); b.textContent='Copied ✓'; }
  catch(e){ const box=$('#shareBox');const r=document.createRange();r.selectNodeContents(box);
    const s=window.getSelection();s.removeAllRanges();s.addRange(r);
    try{document.execCommand('copy');b.textContent='Copied ✓';}catch(_){b.textContent='Select text above';} }
  setTimeout(()=>b.textContent='Copy result & challenge a friend',1700);
}

function show(n){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));$('#'+n).classList.add('on');}

$('#play').addEventListener('click',start);
$('#againBtn').addEventListener('click',start);
$('#copyBtn').addEventListener('click',copyResult);
$('#yesBtn').addEventListener('click',()=>{ if(G&&G.cardEl) resolve(true); });
$('#noBtn').addEventListener('click',()=>{ if(G&&G.cardEl) resolve(false); });
document.addEventListener('keydown',e=>{ if(!G||!G.cardEl)return;
  if(e.key==='ArrowRight') resolve(true); else if(e.key==='ArrowLeft') resolve(false); });
<\/script>
